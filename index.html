<!DOCTYPE html>
<html lang = "ja">  
  <head>
    <meta name = "viewport">
    <meta charset="UTF-8">
    <style>
      #map {
        height: 400px;
        width: 60%
      }
      
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  
  <body onload="initialize()">
    
    <!-- wrapper -->
    <div class="wrapper">
      <div class="header">
        <h1>Test HTML title</h1>
        <p>I made top page.</p>
      <!-- end of .header -->  
      </div>
      
      <div class="mbody">
        <input type="text" name="setAdress">
        <div id="map"></div>
        <script type="text/javascript"> 
          function initialize() { 
            var latlng = new google.maps.LatLng(35.623394447992176, 139.71882674315157); 
            var myOptions = { 
              zoom: 16, 
              center: latlng, 
              mapTypeId: google.maps.MapTypeId.ROADMAP 
            }; 
            var map = new google.maps.Map(document.getElementById("map"), myOptions); 

            var myLatlng = new google.maps.LatLng(35.6234108787027, 139.71855580609898);
            var marker = new google.maps.Marker({
              position: myLatlng,
              map: map,
              title:"I`m here now."
            });   
          } 
 
        </script> 
        <script type=""text/javascript src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyCnyN5lMigrfyz6lKUYpEjdcxmS7o7VZW8&callback=initMap"
            async defer></script> 
      <!-- end of .mbody -->  
      </div>
      
      <div class="footer">
      </div>
      
    <!-- end of .wrapper -->  
    </div>
    
    <div id = "map"></div>
