<html lang = "ja">

      #map {

  <body onload="initialize()">
    
    <!-- wrapper -->
    <div class="wrapper">
      <div class="header">
        <h1>Test HTML title</h1>
        <p>I made top page.</p>
      <!-- end of .header -->  
      </div>
      
      <div class="mbody">
        <div class="form-floating">
          <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea"></textarea>
          <label for="floatingTextarea">Adress</label>
        </div>

        <div id="map"></div>

        <button name="button" class="btn btn-primary">QR Generate</button>

        <script type="text/javascript"> 
          function initialize() { 
            var latlng = new google.maps.LatLng(35.623394447992176, 139.71882674315157); 
            var myOptions = { 
              zoom: 24, 
              center: latlng, 
              mapTypeId: google.maps.MapTypeId.ROADMAP 
            }; 
            var map = new google.maps.Map(document.getElementById("map"), myOptions); 

            var myLatlng = new google.maps.LatLng(35.6234108787027, 139.71855580609898);
            var marker = new google.maps.Marker({
              position: myLatlng,
              map: map,
              title:"I`m here now."
            });   
          } 
 
        </script> 
        <script type=""text/javascript src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyCnyN5lMigrfyz6lKUYpEjdcxmS7o7VZW8&callback=initMap"
            async defer></script> 
      <!-- end of .mbody -->

      </div>
      
    <!-- end of .wrapper -->
